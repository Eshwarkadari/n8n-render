# Pinterest → Instagram Automation
# n8n self-hosted on Render.com (Free Tier)
# ─────────────────────────────────────────

services:
  - type: web
    plan: free
    runtime: image
    name: n8n-service
    image:
      url: docker.io/n8nio/n8n:latest

    # Render spins down free services after 15min inactivity.
    # n8n cron jobs will still fire IF the service is awake.
    # Use UptimeRobot (free) to ping your URL every 5 min.
    healthCheckPath: /healthz

    envVars:
      # ── Security ────────────────────────────────────────────────────────
      - key: N8N_ENCRYPTION_KEY
        generateValue: true

      # ── Database (Render Postgres) ───────────────────────────────────────
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8n-db
          property: database
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8n-db
          property: host
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8n-db
          property: password
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8n-db
          property: user
      - key: DB_POSTGRESDB_PORT
        value: "5432"
      - key: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
        value: "false"

      # ── n8n Core Settings ────────────────────────────────────────────────
      - key: N8N_PORT
        value: "5678"
      - key: N8N_PROTOCOL
        value: https
      - key: NODE_ENV
        value: production
      - key: EXECUTIONS_PROCESS
        value: main
      - key: N8N_HIRING_BANNER_ENABLED
        value: "false"
      - key: N8N_DIAGNOSTICS_ENABLED
        value: "false"
      - key: N8N_VERSION_NOTIFICATIONS_ENABLED
        value: "false"

      # ── Webhook URL (set this after first deploy) ────────────────────────
      # Replace with your actual Render URL:  https://n8n-service.onrender.com
      - key: WEBHOOK_URL
        value: https://n8n-service.onrender.com
      - key: N8N_EDITOR_BASE_URL
        value: https://n8n-service.onrender.com

      # ── Timezone (IST for India) ─────────────────────────────────────────
      - key: GENERIC_TIMEZONE
        value: Asia/Kolkata
      - key: TZ
        value: Asia/Kolkata

      # ── Pinterest → Instagram Workflow Credentials ───────────────────────
      # Instagram Graph API
      - key: INSTAGRAM_ACCOUNT_ID
        value: "967454269255245"
      - key: INSTAGRAM_ACCESS_TOKEN
        value: IGAANv5QAOLk1BZAFloVFNpazYwOGs1X3E2ZA1YwZA3RIQnZALazd6QTUxb2ZA1VDEzVUk1NExuS0pRd2xGSUZATTTVZAWEdNUnBIQ2VCekk4VXBxcEpDZAzlNMy1PZA2R2QS10OFBmSTdYM0E1STYxeTVVdEl1RHlWVDNBQXBiektwOXZAfUQZDZD

      # Telegram
      - key: TELEGRAM_CHAT_ID
        value: "7446081188"

      # Google Sheet ID
      - key: GOOGLE_SHEET_ID
        value: 15jDXVQTA7mjc9vWkF134EGWGvmvdNrzchNsjdSbN960

databases:
  - name: n8n-db
    plan: free
